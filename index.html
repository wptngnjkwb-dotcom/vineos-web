<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VineOS — Správa vinařství</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f0eb;
      color: #2a1a0e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 40px rgba(0,0,0,.10);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
    h1 { font-size: 2rem; font-weight: 700; color: #7a1f1f; margin-bottom: 0.5rem; }
    .sub { font-size: 1.05rem; color: #666; margin-bottom: 2rem; line-height: 1.5; }
    .badge {
      display: inline-block;
      background: #f5f0eb;
      color: #7a1f1f;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .contact { margin-top: 2rem; font-size: 0.9rem; color: #999; }
    .contact a { color: #7a1f1f; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍷</div>
    <h1>VineOS</h1>
    <p class="sub">Digitální správa vinařství.<br>Brzy spustíme — připravujeme pro vás něco výjimečného.</p>
    <span class="badge">Již brzy / Coming soon</span>
    <p class="contact">Dotazy: <a href="mailto:vineos.info@gmail.com">vineos.info@gmail.com</a></p>
  </div>
</body>
</html>
